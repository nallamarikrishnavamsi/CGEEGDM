rng_seeding:
  seed: 42
  workers: True

trainer:
  _target_: lightning.pytorch.Trainer
  max_epochs: 30

model:
  pretrain_checkpoint: "./checkpoint/pretrain/hms_icoh/backbone_icoh.ckpt"
  n_class: 6
  lambda_supcon: 0.1
  proj_dim: 128
  use_kl: True
  use_supcon: True
  phase1_epochs: 10
  phase2_epochs: 20
  model_kwargs:
    start: 0
    end: null
    diffusion_t: 1
    query: ["gate"]
    reduce: ["std"]
    rescale: False
    L: 2000
    window_size: 200
    window_step: 200
    pool_merge: "share"
    multi_query_merge: "seq"
    d_embed: null
    init_weight: False
    embed_query: False
    d_query_embed: null
    have_ch_pos_embed: False
    cat_ch_pos_embed: True
    ch_pos_emb_sym: "mirror"
    ch_order: ["Fp1","F3","C3","P3","F7","T3","T5","O1",
               "Fz","Cz","Pz","Fp2","F4","C4","P4","F8","T4","T6","O2"]
    clst_dim: "TP"
    clst_pos_embed_dim: ""
    n_clst: 16
    stack_struct: "scf"
    num_heads: 8
    ff: 4
    dropout: 0.1
    have_crossnorm: False
    across_pool_stack_struct: ""
    n_ap_clst: 0
    ap_clst_dim: "T"
    classifier_use_ap_clst: False
    classifier_have_pos_embed: True
    classifier_pos_embed_dim: "TPN"
    classifier_stack_struct: "sfsfsfsfsfsfsfsf"
    classifier_final_act: "pool"
    n_class: 6
  ema_kwargs:
    beta: 0.999
    update_after_step: 100
    update_every: 10
  opt_kwargs:
    lr: 1e-4
    weight_decay: 0.05
    betas: [0.9, 0.98]
  sch_kwargs:
    pct_start: 0.1
    max_lr: 5e-4
    # total_steps computed dynamically in finetune_hms.py

data:
  _target_: builtins.dict
  root: "./data/hms"
  train_dir: "train_split"
  val_dir: "val_split"
  test_dir: "test_split"
  icoh_cache_dir: "./data/icoh_cache"
  batch_size: 32
  num_workers: 4
  window_sec: 10
  fs: 200
